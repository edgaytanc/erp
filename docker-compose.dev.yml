services:
  db:
    image: postgres:16
    container_name: erp_db
    env_file:
      - infra/env/.env
    environment:
      POSTGRES_DB: erp_db
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: erp_backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - infra/env/.env
    environment:
      # puedes dejar estas aquí para "forzar" valores en dev
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: "postgresql://erp_user:erp_password@db:5432/erp_db"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"


  frontend:
    image: node:20-alpine
    container_name: erp_frontend
    working_dir: /app
    depends_on:
      - backend
    env_file:
      - infra/env/.env
    environment:
      VITE_API_BASE_URL: "http://localhost:8000/api"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  pgdata_dev:
