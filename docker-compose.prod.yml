services:
  db:
    image: postgres:16
    container_name: erp_db_prod
    environment:
      POSTGRES_DB: erp_db
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp_db"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: erp_backend_prod
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DATABASE_URL: "postgresql://erp_user:${POSTGRES_PASSWORD}@db:5432/erp_db"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    expose:
      - "8000"
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "3"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('localhost',8000)); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: erp_frontend_prod
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/ > /dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  pgdata_prod:
